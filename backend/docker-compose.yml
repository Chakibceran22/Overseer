# backend/docker-compose.yml
services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5
      start_period: 10s

  migrate:
    image: file-uploader:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ["node", "dist/src/db/migrate.js"]
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    image: file-uploader:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
