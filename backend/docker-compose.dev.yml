services:
  postgres:
    image: postgres:16-alpine
    container_name: file-uploader-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"

  s3-bucket:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z   # pin instead of :latest
    container_name: file-uploader-minio
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  s3-bucket-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z      # pin instead of :latest
    container_name: file-uploader-minio-init
    env_file:
      - .env
    depends_on:
      s3-bucket:
        condition: service_healthy        # wait until MinIO is actually ready
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://s3-bucket:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb minio/files --ignore-existing
      "

  redis:
    image: redis:7-alpine                 
    container_name: file-uploader-redis
    restart: unless-stopped
    env_file:
      - .env
    command: ["sh", "-c", "exec redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  minio_data:
    driver: local
    name: file_uploader_minio_data
  pgdata:
    name: file_uploader_db
  redis_data:
    name: file_uploader_redis
